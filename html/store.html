<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/core.css">
    <link rel="stylesheet" href="/assets/css/store.css">
    <link rel="icon" href="/assets/images/logo/icon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Nexus Store</title>
</head>
<body>
    <main>
        <header class="navbar-nexus">
            <div class="navbar-container">
                <div class="logo">
                    <a href="store.html"><img id="img-logo" src="/assets/images/logo/nexus_logo.png" alt="Nexus Icon"></a>
                </div>
                <nav class="nav-links">
                    <a href="index.html">Landing Page</a>
                    <a href="inventory.html">Inventory</a>
                </nav>
                <div class="cart">
                    <a>
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cart-count">0</span>
                    </a>
                </div>
                <div class="nav-actions" id="user-area">
                    <button class="login-btn">Login/Register</button>
                </div>                              
            </div>
        </header>   


        <section class="store-container">
            <div class = "store-layout">
                <div class="store-menu">
                    <div class="filter-group">
                        <label for="filters">Filter:</label>
                        <select id="filters" name="filter">
                            <option value="all">All</option>
                            <option value="weapons">Weapons</option>
                            <option value="armor">Armor</option>
                        </select>
                
                        <label for="rarity">Rarity:</label>
                        <select id="rarity" name="rarity">
                            <option value="all">All</option>
                            <option value="common">Common</option>
                            <option value="rare">Rare</option>
                            <option value="legendary">Legendary</option>
                        </select>
                    
                        <label for="item-type">Type:</label>
                        <select id="item-type" name="item-type">
                            <option value="all">All</option>
                            <option value="bow">Bows</option>
                            <option value="sword">Swords</option>
                            <option value="spear">Spears</option>
                            <option value="dagger">Daggers</option>
                            <option value="shield">Shields</option>
                            <option value="helmet">Helmet</option>
                            <option value="chest">Chest</option>
                            <option value="arms">Arms</option>
                            <option value="leggings">Leggings</option>
                        </select>
                    </div>
                </div>
                <div class="store-content">
                    <div class="store-grid">
                    
                    </div>
                    <div class="pagination">

                    </div>
                </div>
            </div>
        </section> 
        <div id="auth-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-modal" class="close-btn">&times;</span>

                <h2>Login / Register</h2>

                <input type="text" id="username-input" placeholder="Enter Username"/>
                <button id="auth-submit">Continue</button>
            </div>
        </div>   
        <div id="cart-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-cart" class="close-btn">&times;</span>
                <h2>Shopping Cart</h2>
                <div id="cart-items"></div>
                <h3 id="cart-total">Total: 0G</h3>
                <button id="buy-cart-btn">Buy Items</button>
                <button id="clear-cart-btn">Clear Cart</button>
            </div>
        </div>
        <div id="toast-container"></div>
    </main>

    <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
